name: Build OpenCC.NET.GUI (Lightweight)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore OpenCC.NET.GUI.csproj

    - name: Build and Publish
      # --self-contained false: 輕量化，依賴系統 .NET
      # -p:PublishSingleFile=true: 封裝 DLL 
      # -p:DebugType=none & -p:DebugSymbols=false: 徹底移除 .pdb
      run: >
        dotnet publish OpenCC.NET.GUI.csproj
        -c Release
        -r win-x64
        --self-contained false
        -p:PublishSingleFile=true
        -p:PublishReadyToRun=true
        -p:DebugSymbols=false
        -p:DebugType=none
        -o ./build_output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenCC-NET-GUI-Light-v1.2.0
        path: ./build_output/
