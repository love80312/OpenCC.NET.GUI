name: Build OpenCC.NET.GUI (Ultra-Light)

on:
  push:
    branches: [ "master", "main", "cnt" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore OpenCC.NET.GUI.csproj

    - name: Build and Publish
      # 關鍵：將 SingleFile 設為 false
      run: >
        dotnet publish OpenCC.NET.GUI.csproj
        -c Release
        --self-contained false
        -p:PublishSingleFile=false
        -p:DebugSymbols=false
        -p:DebugType=none
        -o ./dist

    - name: Zip Artifact
      shell: pwsh
      # 這次 ZIP 裡面會包含所有散落的 DLL，這才是標準做法
      run: Compress-Archive -Path ./dist/* -DestinationPath OpenCC-NET-GUI-Standard.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenCC-NET-GUI-v1.2.0-Standard
        path: OpenCC-NET-GUI-Standard.zip
