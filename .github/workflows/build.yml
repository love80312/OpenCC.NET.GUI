name: Build OpenCC.NET.GUI (Standard)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      # 直接指向根目錄的專案檔
      run: dotnet restore OpenCC.NET.GUI.csproj

    - name: Build and Publish
      # 移除路徑前綴，直接編譯 OpenCC.NET.GUI.csproj
      run: >
        dotnet publish OpenCC.NET.GUI.csproj
        -c Release
        -r win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:PublishReadyToRun=true
        -o ./build_output

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenCC-NET-GUI-v1.2.0
        path: ./build_output/
